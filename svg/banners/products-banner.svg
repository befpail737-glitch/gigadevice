<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#productsGradient)"/>
  
  <!-- Products Grid Pattern -->
  <g opacity="0.1">
    <rect x="50" y="50" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
    <rect x="170" y="50" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
    <rect x="290" y="50" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
    <rect x="50" y="150" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
    <rect x="170" y="150" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
    <rect x="290" y="150" width="100" height="80" stroke="white" stroke-width="1" fill="none"/>
  </g>
  
  <!-- MCU Illustration -->
  <g transform="translate(800, 50)">
    <!-- Main chip -->
    <rect x="0" y="0" width="150" height="150" rx="8" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
    <!-- Label -->
    <text x="75" y="40" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="16" font-weight="bold">GD32</text>
    <text x="75" y="65" text-anchor="middle" fill="white" font-family="Arial" font-size="12">MCU</text>
    <!-- Pins left -->
    <line x1="-15" y1="20" x2="0" y2="20" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="40" x2="0" y2="40" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="60" x2="0" y2="60" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="80" x2="0" y2="80" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="100" x2="0" y2="100" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="120" x2="0" y2="120" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="140" x2="0" y2="140" stroke="#48bb78" stroke-width="2"/>
    <!-- Pins right -->
    <line x1="150" y1="20" x2="165" y2="20" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="40" x2="165" y2="40" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="60" x2="165" y2="60" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="80" x2="165" y2="80" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="100" x2="165" y2="100" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="120" x2="165" y2="120" stroke="#48bb78" stroke-width="2"/>
    <line x1="150" y1="140" x2="165" y2="140" stroke="#48bb78" stroke-width="2"/>
    <!-- Pins top -->
    <line x1="20" y1="-15" x2="20" y2="0" stroke="#48bb78" stroke-width="2"/>
    <line x1="40" y1="-15" x2="40" y2="0" stroke="#48bb78" stroke-width="2"/>
    <line x1="60" y1="-15" x2="60" y2="0" stroke="#48bb78" stroke-width="2"/>
    <line x1="80" y1="-15" x2="80" y2="0" stroke="#48bb78" stroke-width="2"/>
    <line x1="100" y1="-15" x2="100" y2="0" stroke="#48bb78" stroke-width="2"/>
    <line x1="120" y1="-15" x2="120" y2="0" stroke="#48bb78" stroke-width="2"/>
    <!-- Pins bottom -->
    <line x1="20" y1="150" x2="20" y2="165" stroke="#48bb78" stroke-width="2"/>
    <line x1="40" y1="150" x2="40" y2="165" stroke="#48bb78" stroke-width="2"/>
    <line x1="60" y1="150" x2="60" y2="165" stroke="#48bb78" stroke-width="2"/>
    <line x1="80" y1="150" x2="80" y2="165" stroke="#48bb78" stroke-width="2"/>
    <line x1="100" y1="150" x2="100" y2="165" stroke="#48bb78" stroke-width="2"/>
    <line x1="120" y1="150" x2="120" y2="165" stroke="#48bb78" stroke-width="2"/>
  </g>
  
  <!-- Flash Memory Icons -->
  <g transform="translate(1000, 80)">
    <rect x="0" y="0" width="80" height="60" rx="4" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
    <text x="40" y="35" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="10" font-weight="bold">NOR</text>
  </g>
  <g transform="translate(1000, 160)">
    <rect x="0" y="0" width="80" height="60" rx="4" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
    <text x="40" y="35" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="10" font-weight="bold">NAND</text>
  </g>
  
  <!-- Connection lines -->
  <line x1="965" y1="125" x2="1000" y2="110" stroke="#48bb78" stroke-width="1" opacity="0.5"/>
  <line x1="965" y1="125" x2="1000" y2="190" stroke="#48bb78" stroke-width="1" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="250" r="40" fill="url(#productCircle)" opacity="0.3"/>
  <circle cx="1100" cy="50" r="60" fill="url(#productCircle)" opacity="0.2"/>
  
  <defs>
    <linearGradient id="productsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="productCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>