<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#supportGradient)"/>
  
  <!-- Support Icons Pattern -->
  <g opacity="0.1">
    <!-- Document icons -->
    <rect x="50" y="50" width="40" height="50" stroke="white" stroke-width="1" fill="none"/>
    <line x1="60" y1="65" x2="80" y2="65" stroke="white" stroke-width="1"/>
    <line x1="60" y1="75" x2="80" y2="75" stroke="white" stroke-width="1"/>
    <line x1="60" y1="85" x2="80" y2="85" stroke="white" stroke-width="1"/>
    
    <!-- Tool/Wrench icon -->
    <path d="M100 150 L110 160 L120 150" stroke="white" stroke-width="2" fill="none"/>
    <line x1="110" y1="160" x2="110" y2="180" stroke="white" stroke-width="2"/>
    
    <!-- Code brackets -->
    <text x="900" y="100" fill="white" font-family="monospace" font-size="40">&lt;/&gt;</text>
  </g>
  
  <!-- Central Support Hub -->
  <g transform="translate(500, 50)">
    <!-- Main support icon -->
    <circle cx="100" cy="100" r="80" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <text x="100" y="90" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="48">?</text>
    <text x="100" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="14">FAQ</text>
    
    <!-- Surrounding support elements -->
    <!-- Documentation -->
    <g transform="translate(-20, -20)">
      <rect x="0" y="0" width="50" height="60" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="25" x2="40" y2="25" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="35" x2="30" y2="35" stroke="#48bb78" stroke-width="2"/>
      <line x1="50" y1="30" x2="70" y2="50" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Tools -->
    <g transform="translate(170, -20)">
      <circle cx="25" cy="25" r="20" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <text x="25" y="30" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="12">🔧</text>
      <line x1="5" y1="25" x2="-15" y2="50" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Video/Training -->
    <g transform="translate(-20, 120)">
      <rect x="0" y="0" width="60" height="40" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <polygon points="25,12 25,28 40,20" fill="#48bb78"/>
      <line x1="60" y1="20" x2="80" y2="80" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Chat/Support -->
    <g transform="translate(160, 120)">
      <rect x="0" y="0" width="50" height="40" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <rect x="10" y="40" width="15" height="10" fill="#48bb78"/>
      <line x1="0" y1="20" x2="-20" y2="80" stroke="#48bb78" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="250" r="60" fill="url(#supportCircle)" opacity="0.2"/>
  <circle cx="1050" cy="80" r="50" fill="url(#supportCircle)" opacity="0.15"/>
  
  <!-- Circuit lines -->
  <path d="M50 200 L100 200 L100 150 L150 150" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M1100 250 L1050 250 L1050 200 L1000 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  
  <defs>
    <linearGradient id="supportGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="supportCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>