<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#homeGradient)"/>
  
  <!-- Circuit Board Pattern -->
  <g opacity="0.15">
    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    
    <!-- Vertical lines -->
    <line x1="200" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="white" stroke-width="1"/>
    
    <!-- Connection nodes -->
    <circle cx="200" cy="100" r="5" fill="#48bb78"/>
    <circle cx="400" cy="200" r="5" fill="#48bb78"/>
    <circle cx="600" cy="100" r="5" fill="#48bb78"/>
    <circle cx="800" cy="300" r="5" fill="#48bb78"/>
    <circle cx="1000" cy="200" r="5" fill="#48bb78"/>
    <circle cx="200" cy="300" r="5" fill="#48bb78"/>
    <circle cx="600" cy="300" r="5" fill="#48bb78"/>
  </g>
  
  <!-- Microcontroller Chip Illustration -->
  <g transform="translate(850, 80)">
    <!-- Chip body -->
    <rect x="0" y="0" width="200" height="200" rx="10" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <!-- Inner square -->
    <rect x="50" y="50" width="100" height="100" fill="#1a365d" stroke="#48bb78" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="100" cy="100" r="20" fill="#48bb78"/>
    <!-- Pins -->
    <line x1="-20" y1="30" x2="0" y2="30" stroke="#48bb78" stroke-width="3"/>
    <line x1="-20" y1="60" x2="0" y2="60" stroke="#48bb78" stroke-width="3"/>
    <line x1="-20" y1="90" x2="0" y2="90" stroke="#48bb78" stroke-width="3"/>
    <line x1="-20" y1="120" x2="0" y2="120" stroke="#48bb78" stroke-width="3"/>
    <line x1="-20" y1="150" x2="0" y2="150" stroke="#48bb78" stroke-width="3"/>
    <line x1="200" y1="30" x2="220" y2="30" stroke="#48bb78" stroke-width="3"/>
    <line x1="200" y1="60" x2="220" y2="60" stroke="#48bb78" stroke-width="3"/>
    <line x1="200" y1="90" x2="220" y2="90" stroke="#48bb78" stroke-width="3"/>
    <line x1="200" y1="120" x2="220" y2="120" stroke="#48bb78" stroke-width="3"/>
    <line x1="200" y1="150" x2="220" y2="150" stroke="#48bb78" stroke-width="3"/>
    <line x1="30" y1="-20" x2="30" y2="0" stroke="#48bb78" stroke-width="3"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#48bb78" stroke-width="3"/>
    <line x1="90" y1="-20" x2="90" y2="0" stroke="#48bb78" stroke-width="3"/>
    <line x1="120" y1="-20" x2="120" y2="0" stroke="#48bb78" stroke-width="3"/>
    <line x1="150" y1="-20" x2="150" y2="0" stroke="#48bb78" stroke-width="3"/>
    <line x1="30" y1="200" x2="30" y2="220" stroke="#48bb78" stroke-width="3"/>
    <line x1="60" y1="200" x2="60" y2="220" stroke="#48bb78" stroke-width="3"/>
    <line x1="90" y1="200" x2="90" y2="220" stroke="#48bb78" stroke-width="3"/>
    <line x1="120" y1="200" x2="120" y2="220" stroke="#48bb78" stroke-width="3"/>
    <line x1="150" y1="200" x2="150" y2="220" stroke="#48bb78" stroke-width="3"/>
  </g>
  
  <!-- Flash Memory Icon -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
    <text x="60" y="45" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="14" font-weight="bold">FLASH</text>
    <line x1="-15" y1="20" x2="0" y2="20" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="40" x2="0" y2="40" stroke="#48bb78" stroke-width="2"/>
    <line x1="-15" y1="60" x2="0" y2="60" stroke="#48bb78" stroke-width="2"/>
    <line x1="120" y1="20" x2="135" y2="20" stroke="#48bb78" stroke-width="2"/>
    <line x1="120" y1="40" x2="135" y2="40" stroke="#48bb78" stroke-width="2"/>
    <line x1="120" y1="60" x2="135" y2="60" stroke="#48bb78" stroke-width="2"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="60" fill="url(#circleGradient)" opacity="0.3"/>
  <circle cx="1050" cy="350" r="80" fill="url(#circleGradient)" opacity="0.2"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="homeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>