<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#solutionsGradient)"/>
  
  <!-- Industrial Icons Pattern -->
  <g opacity="0.1">
    <!-- Factory/Building outline -->
    <rect x="50" y="100" width="80" height="100" stroke="white" stroke-width="2" fill="none"/>
    <rect x="60" y="120" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="90" y="120" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="60" y="150" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="90" y="150" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    
    <!-- Gear symbols -->
    <circle cx="900" cy="80" r="30" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="900" cy="80" r="15" stroke="white" stroke-width="1" fill="none"/>
    <line x1="900" y1="35" x2="900" y2="50" stroke="white" stroke-width="2"/>
    <line x1="900" y1="110" x2="900" y2="125" stroke="white" stroke-width="2"/>
    <line x1="855" y1="80" x2="870" y2="80" stroke="white" stroke-width="2"/>
    <line x1="930" y1="80" x2="945" y2="80" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Central Solution Hub -->
  <g transform="translate(500, 75)">
    <!-- Central chip -->
    <rect x="75" y="75" width="100" height="100" rx="8" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <circle cx="125" cy="125" r="25" fill="#48bb78"/>
    <text x="125" y="130" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">MCU</text>
    
    <!-- Connected devices -->
    <!-- Industrial -->
    <g transform="translate(0, 0)">
      <rect x="20" y="20" width="50" height="50" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <text x="45" y="50" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="8">IND</text>
      <line x1="70" y1="45" x2="75" y2="75" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- IoT -->
    <g transform="translate(175, 0)">
      <rect x="0" y="20" width="50" height="50" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <text x="25" y="50" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="8">IoT</text>
      <line x1="0" y1="45" x2="-25" y2="75" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Automotive -->
    <g transform="translate(0, 125)">
      <rect x="20" y="0" width="50" height="50" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <text x="45" y="30" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="8">AUTO</text>
      <line x1="70" y1="25" x2="75" y2="25" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Consumer -->
    <g transform="translate(175, 125)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <text x="25" y="30" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="8">CON</text>
      <line x1="0" y1="25" x2="-25" y2="25" stroke="#48bb78" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Decorative circuit lines -->
  <path d="M100 250 L150 250 L150 200 L200 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M1000 50 L1050 50 L1050 100 L1100 100" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="250" r="50" fill="url(#solutionCircle)" opacity="0.2"/>
  <circle cx="1000" cy="200" r="70" fill="url(#solutionCircle)" opacity="0.15"/>
  
  <defs>
    <linearGradient id="solutionsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="solutionCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>