<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#newsGradient)"/>
  
  <!-- News Pattern -->
  <g opacity="0.1">
    <!-- Newspaper icons -->
    <rect x="50" y="50" width="60" height="80" stroke="white" stroke-width="2" fill="none"/>
    <line x1="60" y1="65" x2="100" y2="65" stroke="white" stroke-width="2"/>
    <line x1="60" y1="80" x2="100" y2="80" stroke="white" stroke-width="2"/>
    <line x1="60" y1="95" x2="90" y2="95" stroke="white" stroke-width="2"/>
    <rect x="60" y="110" width="40" height="30" stroke="white" stroke-width="1" fill="none"/>
    
    <!-- RSS/Signal icons -->
    <path d="M900 80 Q920 80 920 100 Q920 120 900 120" stroke="white" stroke-width="2" fill="none"/>
    <path d="M880 60 Q920 60 920 100 Q920 140 880 140" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="870" cy="150" r="5" fill="white"/>
  </g>
  
  <!-- Central News Hub -->
  <g transform="translate(500, 50)">
    <!-- Main newspaper -->
    <rect x="50" y="30" width="100" height="140" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <!-- Header -->
    <rect x="60" y="45" width="80" height="15" fill="#48bb78"/>
    <!-- Article lines -->
    <line x1="60" y1="75" x2="140" y2="75" stroke="#48bb78" stroke-width="2"/>
    <line x1="60" y1="90" x2="140" y2="90" stroke="#48bb78" stroke-width="2"/>
    <line x1="60" y1="105" x2="120" y2="105" stroke="#48bb78" stroke-width="2"/>
    <!-- Image placeholder -->
    <rect x="60" y="120" width="80" height="40" fill="#48bb78" opacity="0.3"/>
    
    <!-- Connected news items -->
    <!-- News item 1 -->
    <g transform="translate(-40, 20)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="25" x2="40" y2="25" stroke="#48bb78" stroke-width="2"/>
      <line x1="50" y1="30" x2="70" y2="60" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- News item 2 -->
    <g transform="translate(150, 20)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="25" x2="40" y2="25" stroke="#48bb78" stroke-width="2"/>
      <line x1="0" y1="30" x2="-20" y2="60" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- News item 3 -->
    <g transform="translate(-40, 120)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="25" x2="40" y2="25" stroke="#48bb78" stroke-width="2"/>
      <line x1="50" y1="30" x2="70" y2="20" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- News item 4 -->
    <g transform="translate(150, 120)">
      <rect x="0" y="0" width="50" height="60" rx="3" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#48bb78" stroke-width="2"/>
      <line x1="10" y1="25" x2="40" y2="25" stroke="#48bb78" stroke-width="2"/>
      <line x1="0" y1="30" x2="-20" y2="20" stroke="#48bb78" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="250" r="60" fill="url(#newsCircle)" opacity="0.2"/>
  <circle cx="1050" cy="80" r="50" fill="url(#newsCircle)" opacity="0.15"/>
  
  <!-- Connection lines -->
  <path d="M100 150 L150 150 L150 200 L200 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M1000 250 L1050 250 L1050 200 L1100 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  
  <defs>
    <linearGradient id="newsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="newsCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>