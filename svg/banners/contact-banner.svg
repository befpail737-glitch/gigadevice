<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#contactGradient)"/>
  
  <!-- Contact/Communication Pattern -->
  <g opacity="0.1">
    <!-- Envelope icons -->
    <rect x="50" y="50" width="60" height="40" stroke="white" stroke-width="2" fill="none"/>
    <path d="M50 50 L80 75 L110 50" stroke="white" stroke-width="2" fill="none"/>
    
    <!-- Phone icons -->
    <rect x="900" y="60" width="30" height="50" rx="5" stroke="white" stroke-width="2" fill="none"/>
    <line x1="915" y1="95" x2="915" y2="100" stroke="white" stroke-width="2"/>
    
    <!-- Location pins -->
    <path d="M100 200 Q100 180 115 180 Q130 180 130 200 Q130 220 115 240 Q100 220 100 200" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="115" cy="200" r="5" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Central Contact Hub -->
  <g transform="translate(500, 50)">
    <!-- Main contact center -->
    <circle cx="100" cy="100" r="70" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <text x="100" y="90" text-anchor="middle" fill="#48bb78" font-family="Arial" font-size="36">@</text>
    <text x="100" y="120" text-anchor="middle" fill="white" font-family="Arial" font-size="12">CONTACT</text>
    
    <!-- Connected contact methods -->
    <!-- Email -->
    <g transform="translate(-30, 0)">
      <rect x="0" y="20" width="50" height="35" rx="3" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <path d="M0 20 L25 40 L50 20" stroke="#48bb78" stroke-width="2" fill="none"/>
      <line x1="50" y1="37" x2="70" y2="70" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Phone -->
    <g transform="translate(180, 0)">
      <rect x="0" y="20" width="35" height="50" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="17" y1="55" x2="17" y2="60" stroke="#48bb78" stroke-width="2"/>
      <line x1="0" y1="45" x2="-20" y2="70" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Location -->
    <g transform="translate(-30, 130)">
      <path d="M25 0 Q25 -20 40 -20 Q55 -20 55 0 Q55 20 40 40 Q25 20 25 0" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <circle cx="40" cy="0" r="5" fill="#48bb78"/>
      <line x1="55" y1="20" x2="70" y2="70" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Chat -->
    <g transform="translate(165, 130)">
      <rect x="0" y="0" width="50" height="40" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <rect x="10" y="40" width="15" height="10" fill="#48bb78"/>
      <line x1="0" y1="20" x2="-15" y2="70" stroke="#48bb78" stroke-width="2"/>
    </g>
  </g>
  
  <!-- World map outline (simplified) -->
  <g opacity="0.1" transform="translate(800, 50)">
    <path d="M50 100 Q100 50 150 100 Q200 150 150 200 Q100 250 50 200 Q0 150 50 100" stroke="white" stroke-width="2" fill="none"/>
    <path d="M100 80 L120 120 L80 120 Z" stroke="white" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="250" r="60" fill="url(#contactCircle)" opacity="0.2"/>
  <circle cx="1000" cy="80" r="70" fill="url(#contactCircle)" opacity="0.15"/>
  
  <!-- Connection lines -->
  <path d="M100 150 L150 150 L150 200 L200 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M1000 250 L1050 250 L1050 200 L1100 200" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  
  <defs>
    <linearGradient id="contactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="contactCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>