<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#aboutGradient)"/>
  
  <!-- Company/Team Pattern -->
  <g opacity="0.1">
    <!-- Building outline -->
    <rect x="50" y="80" width="100" height="120" stroke="white" stroke-width="2" fill="none"/>
    <rect x="65" y="100" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="100" y="100" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="65" y="140" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    <rect x="100" y="140" width="20" height="20" stroke="white" stroke-width="1" fill="none"/>
    
    <!-- People icons -->
    <circle cx="900" cy="100" r="15" stroke="white" stroke-width="2" fill="none"/>
    <path d="M885 130 Q900 115 915 130 L915 150 L885 150 Z" stroke="white" stroke-width="2" fill="none"/>
    
    <circle cx="950" cy="100" r="15" stroke="white" stroke-width="2" fill="none"/>
    <path d="M935 130 Q950 115 965 130 L965 150 L935 150 Z" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Central Company Icon -->
  <g transform="translate(500, 50)">
    <!-- Main building -->
    <rect x="50" y="50" width="100" height="120" rx="5" fill="#2d3748" stroke="#48bb78" stroke-width="3"/>
    <!-- Windows -->
    <rect x="65" y="70" width="25" height="25" fill="#48bb78" opacity="0.5"/>
    <rect x="110" y="70" width="25" height="25" fill="#48bb78" opacity="0.5"/>
    <rect x="65" y="110" width="25" height="25" fill="#48bb78" opacity="0.5"/>
    <rect x="110" y="110" width="25" height="25" fill="#48bb78" opacity="0.5"/>
    <!-- Door -->
    <rect x="90" y="150" width="20" height="20" fill="#48bb78"/>
    
    <!-- Connected people -->
    <!-- Person 1 -->
    <g transform="translate(-30, 80)">
      <circle cx="20" cy="20" r="15" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <path d="M5 45 Q20 30 35 45 L35 70 L5 70 Z" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="35" y1="50" x2="50" y2="100" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Person 2 -->
    <g transform="translate(160, 80)">
      <circle cx="20" cy="20" r="15" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <path d="M5 45 Q20 30 35 45 L35 70 L5 70 Z" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <line x1="5" y1="50" x2="-10" y2="100" stroke="#48bb78" stroke-width="2"/>
    </g>
    
    <!-- Globe/World icon -->
    <g transform="translate(80, -40)">
      <circle cx="20" cy="20" r="25" fill="#2d3748" stroke="#48bb78" stroke-width="2"/>
      <ellipse cx="20" cy="20" rx="10" ry="25" stroke="#48bb78" stroke-width="1" fill="none"/>
      <line x1="-5" y1="20" x2="45" y2="20" stroke="#48bb78" stroke-width="1"/>
      <line x1="20" y1="50" x2="50" y2="90" stroke="#48bb78" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="250" r="70" fill="url(#aboutCircle)" opacity="0.2"/>
  <circle cx="1000" cy="100" r="60" fill="url(#aboutCircle)" opacity="0.15"/>
  
  <!-- Connection lines -->
  <path d="M100 200 L150 200 L150 150 L200 150" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M1000 200 L1050 200 L1050 250 L1100 250" stroke="#48bb78" stroke-width="1" opacity="0.3" fill="none"/>
  
  <defs>
    <linearGradient id="aboutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="aboutCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>