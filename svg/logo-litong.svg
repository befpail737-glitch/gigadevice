<svg width="180" height="50" viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background shape -->
  <rect x="0" y="0" width="50" height="50" rx="8" fill="url(#logoGradient)"/>
  
  <!-- Circuit/Chip design -->
  <rect x="12" y="12" width="26" height="26" rx="3" stroke="white" stroke-width="2" fill="none"/>
  <circle cx="25" cy="25" r="5" fill="white"/>
  
  <!-- Connection lines -->
  <line x1="25" y1="7" x2="25" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="38" x2="25" y2="43" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="7" y1="25" x2="12" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="25" x2="43" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Corner dots -->
  <circle cx="17" cy="17" r="2" fill="white"/>
  <circle cx="33" cy="17" r="2" fill="white"/>
  <circle cx="17" cy="33" r="2" fill="white"/>
  <circle cx="33" cy="33" r="2" fill="white"/>
  
  <!-- Company name -->
  <text x="60" y="22" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">Litong</text>
  <text x="60" y="40" font-family="Arial, sans-serif" font-size="14" fill="#48bb78">Group</text>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48bb78;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>